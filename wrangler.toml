name = "freightmynd"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

[vars]
ENVIRONMENT = "production"

# Secrets (set via CF dashboard → Pages → Settings → Environment variables):
# ANTHROPIC_API_KEY  — Anthropic API key
# SMTP_API_KEY       — Brevo transactional email API key
# LEAD_EMAIL_TO      — Team email for lead notifications (e.g. leads@freightmynd.com)
# LEAD_EMAIL_FROM    — Sender address (e.g. noreply@freightmynd.com)
# ADMIN_TOKEN        — Bearer token for /api/conversation/:id access

[[kv_namespaces]]
binding = "CHAT_SESSIONS"
id = "c092a97cf7ca4f15b9df2a6fe6fc529b"

[[kv_namespaces]]
binding = "CHAT_LEADS"
id = "c092a97cf7ca4f15b9df2a6fe6fc529b"
