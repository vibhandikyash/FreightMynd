# CF Worker config: Workers Static Assets architecture.
# - Astro builds static site to `dist/` (via `npm run build`).
# - This Worker serves /api/* via src/server/worker.ts and falls back to
#   env.ASSETS.fetch(request) for everything else (HTML/CSS/JS/images).
#
# Secrets (set via dashboard or `wrangler secret put <NAME> --name=freightmynd`):
#   ANTHROPIC_API_KEY, SMTP_API_KEY, LEAD_EMAIL_TO, LEAD_EMAIL_FROM, ADMIN_TOKEN

name = "freightmynd"
main = "src/server/worker.ts"
compatibility_date = "2024-12-01"
workers_dev = false  # disable *.workers.dev subdomain; only freightmynd.com serves

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Run the Worker before asset serving for page routes so the trailing-slash
# 301 in worker.ts takes effect (the assets layer's own redirect is a 307,
# which splits SEO signals across both URL variants). Hashed/static assets
# are excluded and keep serving directly from the edge.
run_worker_first = ["/*", "!/_astro/*", "!/fonts/*"]

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "CHAT_LEADS"
id = "c092a97cf7ca4f15b9df2a6fe6fc529b"

[[kv_namespaces]]
binding = "CHAT_SESSIONS"
id = "c092a97cf7ca4f15b9df2a6fe6fc529b"
