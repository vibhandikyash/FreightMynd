# CF Pages project config for FreightMynd marketing site.
# Project: freightmynd-site (distinct from the freightmynd Worker).
# Bindings + ENVIRONMENT var below auto-apply on `wrangler pages deploy`.
# Secrets (set via dashboard or `wrangler pages secret put <NAME>`):
#   ANTHROPIC_API_KEY, SMTP_API_KEY, LEAD_EMAIL_TO, LEAD_EMAIL_FROM, ADMIN_TOKEN
name = "freightmynd-site"
pages_build_output_dir = "dist"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "CHAT_LEADS"
id = "c092a97cf7ca4f15b9df2a6fe6fc529b"

[[kv_namespaces]]
binding = "CHAT_SESSIONS"
id = "c092a97cf7ca4f15b9df2a6fe6fc529b"
